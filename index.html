<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#ff6b6b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="TaskAI">
<link rel="manifest" href="manifest.json">
<title>TaskAI</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#0f0e17;font-family:'Noto Sans JP','Hiragino Kaku Gothic ProN',sans-serif;color:#fffffe;overflow:hidden}
#app{height:100dvh;display:flex;flex-direction:column}
.screen{display:none;flex:1;flex-direction:column;overflow:hidden}
.screen.active{display:flex}

/* header */
.hdr{height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 18px;border-bottom:1px solid #2e2b45;flex-shrink:0;background:#1a1828}
.logo{font-size:20px;font-weight:900;background:linear-gradient(90deg,#ff6b6b,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.btn-add{background:linear-gradient(135deg,#ff6b6b,#a78bfa);border:none;border-radius:22px;padding:8px 18px;color:#fff;font-weight:800;font-size:14px;cursor:pointer}

/* list */
.list-body{flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch}
.list-label{color:#a7a9be;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:14px}
.task-card{background:#1a1828;border:1.5px solid #2e2b45;border-radius:14px;padding:14px 16px;margin-bottom:10px;cursor:pointer}
.task-card:active{background:#221f35}
.task-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.task-title{color:#fffffe;font-weight:700;font-size:15px;flex:1}
.tags{display:flex;gap:5px;flex-shrink:0}
.tag{border-radius:6px;padding:2px 8px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase}
.task-desc{color:#a7a9be;font-size:13px;margin-top:5px;line-height:1.5}
.task-meta{color:#a7a9be;font-size:11px;margin-top:4px}
.empty{text-align:center;padding:60px 0;color:#a7a9be}
.empty-icon{font-size:44px;margin-bottom:12px}

/* chat */
.chat-hdr{height:56px;display:flex;align-items:center;gap:10px;padding:0 16px;border-bottom:1px solid #2e2b45;flex-shrink:0;background:#1a1828}
.back-btn{background:none;border:none;color:#a7a9be;font-size:28px;cursor:pointer;padding:0 8px 0 0;line-height:1}
.chat-task-info{flex:1;min-width:0}
.chat-task-title{color:#fffffe;font-weight:800;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chat-task-tags{display:flex;gap:5px;margin-top:3px}
.messages{flex:1;overflow-y:auto;padding:16px 14px 8px;-webkit-overflow-scrolling:touch}
.bubble-wrap{display:flex;margin-bottom:12px}
.bubble-wrap.user{justify-content:flex-end}
.bubble-wrap.ai{justify-content:flex-start}
.ai-avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#ff6b6b,#a78bfa);display:flex;align-items:center;justify-content:center;font-size:12px;margin-right:8px;flex-shrink:0;margin-top:2px}
.bubble{max-width:80%;padding:10px 14px;font-size:14px;line-height:1.7;white-space:pre-wrap;border-radius:18px}
.bubble.user{background:linear-gradient(135deg,rgba(255,107,107,0.8),rgba(167,139,250,0.6));border-radius:18px 18px 4px 18px}
.bubble.ai{background:#221f35;border:1px solid #2e2b45;border-radius:18px 18px 18px 4px}
.typing{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.typing-bubble{background:#221f35;border:1px solid #2e2b45;border-radius:16px 16px 16px 4px;padding:10px 14px;color:#a7a9be;font-size:18px;letter-spacing:4px}
.input-bar{padding:10px 12px;padding-bottom:calc(10px + env(safe-area-inset-bottom));border-top:1px solid #2e2b45;display:flex;gap:8px;background:#1a1828;align-items:flex-end}
#msg-input{flex:1;background:#221f35;border:1px solid #2e2b45;border-radius:20px;padding:10px 14px;color:#fffffe;font-size:15px;outline:none;resize:none;font-family:inherit;line-height:1.5;overflow:hidden;max-height:100px}
#msg-input::placeholder{color:#a7a9be}
.send-btn{width:44px;height:44px;border-radius:50%;border:none;background:#2e2b45;color:#fff;font-size:18px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:background .2s}
.send-btn.active{background:linear-gradient(135deg,#ff6b6b,#a78bfa)}

.gpt-panel{padding:18px;background:#1a1828;border:1.5px solid #2e2b45;border-radius:16px;margin-bottom:14px}
.gpt-title{font-size:16px;font-weight:800;margin-bottom:8px;color:#fffffe}
.gpt-desc{font-size:13px;line-height:1.7;color:#a7a9be;margin-bottom:14px}
.gpt-btn{width:100%;border:none;border-radius:14px;background:linear-gradient(135deg,#ff6b6b,#a78bfa);color:#fff;padding:14px 16px;font-size:15px;font-weight:800;cursor:pointer}
.gpt-btn:active{opacity:.85}
.copy-btn{width:100%;border:1px solid #2e2b45;border-radius:14px;background:#221f35;color:#fffffe;padding:12px 16px;font-size:14px;font-weight:700;cursor:pointer;margin-top:10px}

/* modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:#0f0e17;border:1px solid #2e2b45;border-radius:20px;padding:24px;width:100%;max-width:440px}
.modal h2{color:#fffffe;margin:0 0 18px;font-size:18px;font-weight:800}
.field{margin-bottom:12px}
.field label{color:#a7a9be;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;display:block;margin-bottom:4px}
.field input,.field textarea,.field select{width:100%;background:#1a1828;border:1px solid #2e2b45;border-radius:10px;padding:10px 14px;color:#fffffe;font-size:14px;outline:none;font-family:inherit}
.field textarea{resize:vertical;min-height:68px}
.field-row{display:flex;gap:10px}
.field-row .field{flex:1}
.modal-btns{display:flex;gap:10px;margin-top:18px}
.btn-cancel{flex:1;padding:12px;border-radius:10px;border:1px solid #2e2b45;background:transparent;color:#a7a9be;cursor:pointer;font-size:14px}
.btn-submit{flex:2;padding:12px;border-radius:10px;border:none;background:linear-gradient(135deg,#ff6b6b,#a78bfa);color:#fff;cursor:pointer;font-size:14px;font-weight:700}
</style>
</head>
<body>
<div id="app">

  <!-- LIST SCREEN -->
  <div class="screen active" id="screen-list">
    <div class="hdr">
      <span class="logo">TaskAI</span>
      <button class="btn-add" onclick="openModal()">＋ 追加</button>
    </div>
    <div class="list-body">
      <div class="list-label" id="list-count">タスク一覧 (0)</div>
      <div id="task-list"></div>
    </div>
  </div>

  <!-- CHAT SCREEN -->
  <div class="screen" id="screen-chat">
    <div class="chat-hdr">
      <button class="back-btn" onclick="showList()">‹</button>
      <div class="chat-task-info">
        <div class="chat-task-title" id="chat-title"></div>
        <div class="chat-task-tags" id="chat-tags"></div>
      </div>
    </div>
    <div class="messages" id="messages"></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal" onclick="closeModalOutside(event)">
  <div class="modal">
    <h2>＋ タスクを追加</h2>
    <div class="field"><label>タイトル</label><input id="f-title" placeholder="タスク名を入力..."></div>
    <div class="field"><label>詳細（任意）</label><textarea id="f-desc" placeholder="困っていること、状況など..."></textarea></div>
    <div class="field-row">
      <div class="field"><label>優先度</label>
        <select id="f-pri"><option value="high">高</option><option value="mid" selected>中</option><option value="low">低</option></select>
      </div>
      <div class="field"><label>カテゴリ</label>
        <select id="f-cat"><option>仕事</option><option>個人</option><option>学習</option><option>その他</option></select>
      </div>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">キャンセル</button>
      <button class="btn-submit" onclick="submitTask()">追加する</button>
    </div>
  </div>
</div>

<script>
const PRI_L={high:"高",mid:"中",low:"低"};
const PRI_C={high:"#ff6b6b",mid:"#ffd166",low:"#06d6a0"};
const CAT_C={仕事:"#ff6b6b",個人:"#ffd166",学習:"#06d6a0",その他:"#a78bfa"};

let tasks=[
  {id:1,title:"プレゼン資料が完成しない",description:"明日の会議に間に合わせないといけないが、何から手をつければいいか...",priority:"high",category:"仕事",chat:[]},
  {id:2,title:"英語の勉強が続かない",description:"毎日やろうと決めても3日坊主になってしまう",priority:"mid",category:"学習",chat:[]}
];
let currentId=null;
let loading=false;

function tagHTML(label,color){
  return `<span class="tag" style="background:${color}22;color:${color};border:1px solid ${color}55">${label}</span>`;
}

function renderList(){
  const el=document.getElementById('task-list');
  document.getElementById('list-count').textContent=`タスク一覧 (${tasks.length})`;
  if(tasks.length===0){
    el.innerHTML=`<div class="empty"><div class="empty-icon">✦</div><div style="font-size:15px;font-weight:600">タスクを追加して</div><div style="font-size:13px;margin-top:4px">AIと一緒に解消しよう</div></div>`;
    return;
  }
  el.innerHTML=tasks.map(t=>`
    <div class="task-card" onclick="openChat(${t.id})">
      <div class="task-top">
        <span class="task-title">${esc(t.title)}</span>
        <div class="tags">${tagHTML(PRI_L[t.priority],PRI_C[t.priority])}${tagHTML(t.category,CAT_C[t.category]||'#a78bfa')}</div>
      </div>
      ${t.description?`<div class="task-desc">${esc(t.description)}</div>`:''}
      <div class="task-meta" style="display:flex;justify-content:space-between;align-items:center;margin-top:10px;gap:10px;">
        <span>ChatGPTで相談できます</span>
        <button class="gpt-list-btn" onclick="event.stopPropagation(); openGPT(${t.id})" style="border:none;background:linear-gradient(135deg,#ff6b6b,#a78bfa);color:white;padding:8px 12px;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;">ChatGPTに質問</button>
      </div>
    </div>`).join('');
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function openChat(id){
  currentId=id;
  const t=tasks.find(x=>x.id===id);
  document.getElementById('chat-title').textContent=t.title;
  document.getElementById('chat-tags').innerHTML=tagHTML(PRI_L[t.priority],PRI_C[t.priority])+tagHTML(t.category,CAT_C[t.category]||'#a78bfa');
  document.getElementById('screen-list').classList.remove('active');
  document.getElementById('screen-chat').classList.add('active');
  renderMessages();
}

function showList(){
  document.getElementById('screen-chat').classList.remove('active');
  document.getElementById('screen-list').classList.add('active');
  renderList();
}

function makePrompt(t){
  return `次のタスクについて相談したいです。

タイトル：${t.title}
詳細：${t.description || 'なし'}
優先度：${PRI_L[t.priority]}
カテゴリ：${t.category}

具体的に、今すぐ何から始めればいいか教えてください。`;
}

function openGPT(id){
  const t=tasks.find(x=>x.id===id);
  const url='https://chatgpt.com/?q='+encodeURIComponent(makePrompt(t));
  window.open(url,'_blank');
}

async function copyPrompt(id){
  const t=tasks.find(x=>x.id===id);
  try{
    await navigator.clipboard.writeText(makePrompt(t));
    alert('質問文をコピーしました。ChatGPTに貼り付けて使えます。');
  }catch(e){
    alert('コピーできませんでした。ChatGPTボタンから開いてください。');
  }
}

function renderMessages(){
  const t=tasks.find(x=>x.id===currentId);
  const el=document.getElementById('messages');
  el.innerHTML=`
    <div class="gpt-panel">
      <div class="gpt-title">このタスクをChatGPTに相談</div>
      <div class="gpt-desc">アプリ内AIは使わず、ChatGPTを開いて相談します。APIキー不要・無料で使いやすい方式です。</div>
      <button class="gpt-btn" onclick="openGPT(${t.id})">ChatGPTに質問する</button>
      <button class="copy-btn" onclick="copyPrompt(${t.id})">質問文だけコピーする</button>
    </div>
    <div class="bubble-wrap ai">
      <div class="ai-avatar">✦</div>
      <div class="bubble ai">「ChatGPTに質問する」を押すと、タスク内容を入れた質問文でChatGPTを開きます。</div>
    </div>`;
}

function openModal(){document.getElementById('modal').classList.add('open');}
function closeModal(){document.getElementById('modal').classList.remove('open');}
function closeModalOutside(e){if(e.target===document.getElementById('modal'))closeModal();}

function submitTask(){
  const title=document.getElementById('f-title').value.trim();
  if(!title)return;
  const t={id:Date.now(),title,description:document.getElementById('f-desc').value.trim(),priority:document.getElementById('f-pri').value,category:document.getElementById('f-cat').value,chat:[]};
  tasks.push(t);
  document.getElementById('f-title').value='';
  document.getElementById('f-desc').value='';
  closeModal();
  openChat(t.id);
}

renderList();
</script>
</body>
</html>
